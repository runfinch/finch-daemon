name: samcli-direct

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

env:
  GO_VERSION: '1.25.8'

permissions:
  id-token: write
  contents: read

jobs:
  set-vars:
    runs-on: ubuntu-latest
    steps:
      - name: Set output variables
        id: vars
        run: |
          has_creds=${{ (github.event_name != 'pull_request' || github.repository == github.event.pull_request.head.repo.full_name) && github.actor != 'dependabot[bot]' }}
          echo "has_creds=$has_creds" >> $GITHUB_OUTPUT
    outputs:
      has_creds: ${{ steps.set-vars.outputs.has_creds }}

  samcli-direct-test:
    needs: set-vars
    # Skip if no access to creds
    if: ${{ needs.set-vars.outputs.has_creds == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        test_type: [unit, package, invoke, start-lambda, start-api]
    env:
      AWS_DEFAULT_REGION: "${{ secrets.REGION }}"
      DOCKER_HOST: unix:///var/run/finch.sock
      DOCKER_CONFIG: $HOME/.finch
      BY_CANARY: true # allows full testing
      SAM_CLI_DEV: 1
      SAM_CLI_TELEMETRY: 0
    steps:

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.SAMCLI_DIRECT_ROLE_BASE }}
          role-session-name: samcli-${{ matrix.test_type }}-tests
          aws-region: ${{ secrets.REGION }}
          role-duration-seconds: 14400

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      # from aws/aws-sam-cli/setup.py: python_requires=">=3.9, <=4.0, !=4.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # python version should match https://github.com/aws/aws-sam-cli/blame/develop/tests/integration/testdata/durable/template.yaml
          python-version: '3.13'

      - name: Checkout finch-daemon
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Pre-test AWS resource cleanup
        timeout-minutes: 10
        run: ./scripts/cleanup-aws-resources.sh

      - name: Stop pre-existing services
        run: |
          sudo systemctl stop docker
          sudo systemctl stop containerd

      - name: Remove default podman network config
        run: |
          sudo rm -f /etc/cni/net.d/87-podman-bridge.conflist

      - name: Clean up Daemon socket
        run: |
          sudo rm -f /run/finch.sock
          sudo rm -f /run/finch.pid
          sudo rm -f /run/finch-credential.sock

      - name: Install finch-daemon dependencies
        run: |
          ./setup-test-env.sh
          sleep 10

      - name: Build and start finch-daemon
        run: |
          make build
          sudo bin/finch-daemon --debug --socket-owner $UID 2>&1 | tee finch-daemon.log &
          sleep 10

      - name: Get latest SAM CLI tag
        id: sam-tag
        run: |
          TAG=$(curl -s https://api.github.com/repos/aws/aws-sam-cli/releases/latest | jq -r .tag_name)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Checkout SAM CLI
        uses: actions/checkout@v6
        with:
          repository: aws/aws-sam-cli
          submodules: recursive
          path: aws-sam-cli
          ref: ${{ steps.sam-tag.outputs.tag }}

      - name: Set up SAM CLI from source
        working-directory: aws-sam-cli
        run: |
          python -m pip install --upgrade pip
          make init
          # Pin chardet to avoid 6.0.0 which breaks requests compatibility (released Feb 22, 2026)
          python -m pip install 'chardet<6.0.0'
          samdev --version

      # Python 3.13 GC catches unclosed urllib3 responses from Docker SDK's
      # container.attach(), causing spurious failures via filterwarnings=error.
      - name: Patch pytest.ini for Python 3.13 compatibility
        working-directory: aws-sam-cli
        run: |
          sed -i '/default::ResourceWarning/a\    ignore::pytest.PytestUnraisableExceptionWarning' pytest.ini

      - name: Run ${{ matrix.test_type }} tests
        run: ./scripts/samcli-direct/run-${{ matrix.test_type }}-tests.sh

      - name: Show finch-daemon logs
        if: always()
        run: |
          echo "=== FINCH-DAEMON OUTPUT ==="
          cat finch-daemon.log

  # ensuring resources are clean post-test
  cleanup:
    needs: [set-vars, samcli-direct-test]
    # Skip if no access to creds
    if: ${{ needs.set-vars.outputs.has_creds == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          role-to-assume: ${{ secrets.SAMCLI_DIRECT_ROLE_BASE }}
          role-session-name: cleanup-samcli-direct
          aws-region: ${{ secrets.REGION }}

      - name: Comprehensive AWS resource cleanup
        timeout-minutes: 10
        run: ./scripts/cleanup-aws-resources.sh
