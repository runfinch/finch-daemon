version: "2"

# The sections in this file are ordered in the order presented in
# https://golangci-lint.run/usage/configuration/.
# The nested fields are ordered alphabetically.

linters:
  enable:
    # - errname
    # - errorlint
    - copyloopvar
    # - forcetypeassert
    # - gocritic
    - godot
    - goheader
    - gosec
    - lll
    # - makezero
    - misspell
    # - nilerr
    # - nilnil
    - nolintlint
    - nosprintfhostport
    # - paralleltest
    - predeclared
    - reassign
    # - revive
    - testableexamples
    - unconvert
    # - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
    - staticcheck
  disable:
    - errcheck
  settings:
    goheader:
      template-path: copyright_header
    gosec:
      config:
        G306: "0o644"
      excludes:
        - G304
        - G101
        - G104
        - G115 # added to prevent false uint conversion errors
    lll:
      line-length: 250
      tab-width: 4
    nolintlint:
      require-explanation: true
      require-specific: true
    staticcheck:
      checks:
        - ST*
        - -ST1003
        - -ST1000
        - -ST1001
        - -ST1021
        - -QF*
        - -S*
        - -SA*
  exclusions:
    rules:
      - linters:
          - lll
        source: "^//go:generate "

run:
  timeout: 5m

formatters:
  settings:
    goimports:
      local-prefixes:
        - github.com/runfinch/finch-daemon
